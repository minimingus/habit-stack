name: HabitStack
options:
  bundleIdPrefix: com.tomerab
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: 4.0.0
  PostHog:
    url: https://github.com/posthog/posthog-ios
    from: 3.0.0

targets:
  HabitStack:
    type: application
    platform: iOS
    sources:
      - path: HabitStack
    resources:
      - path: HabitStack/Assets.xcassets
      - path: HabitStack/Secrets.plist
        optional: true
    info:
      path: HabitStack/Info.plist
      properties:
        CFBundleName: HabitStack
        CFBundleIdentifier: com.tomerab.habitstack
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: Used for profile photos
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: PostHog
        product: PostHog
      - target: HabitStackWidget
        embed: true
    settings:
      base:
        SWIFT_VERSION: "5.10"
        DEVELOPMENT_TEAM: FDLSN3ZJFV
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.tomerab.habitstack
        CODE_SIGN_ENTITLEMENTS: HabitStack/HabitStack.entitlements

  HabitStackWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: HabitStackWidget
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    info:
      path: HabitStackWidget/Info.plist
      properties:
        CFBundleDisplayName: HabitStack Widget
        CFBundleIdentifier: com.tomerab.habitstack.widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        SWIFT_VERSION: "5.10"
        DEVELOPMENT_TEAM: FDLSN3ZJFV
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.tomerab.habitstack.widget
        CODE_SIGN_ENTITLEMENTS: HabitStackWidget/HabitStackWidget.entitlements

  HabitStackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HabitStackTests
    dependencies:
      - target: HabitStack
    settings:
      base:
        SWIFT_VERSION: "5.10"
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: FDLSN3ZJFV
